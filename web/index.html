<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Canvas Chat</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://unpkg.com/konva@9.3.16/konva.min.js"></script>
  </head>
  <body>
    <div id="toolbar">
      <button data-tool="select" class="active">Select</button>
      <button data-tool="draw">Draw</button>
      <button data-tool="rect">Rect</button>
      <button data-tool="ellipse">Ellipse</button>
      <button data-tool="text">Text</button>
      <button data-tool="node">Mind node</button>
      <label class="upload">
        Upload image
        <input id="upload" type="file" accept="image/*" multiple hidden />
      </label>
      <button id="paste">Paste screenshot</button>
      <button id="delete">Delete</button>
      <button id="clear">Clear</button>
      <span id="hint">Tip: paste from clipboard with Cmd+V. Click an object then "Add to chat".</span>
    </div>

    <div id="stage"></div>

    <div id="chatbox">
      <div id="chat_header">
        <span>Chat with Claude</span>
        <button id="collapse" title="collapse">_</button>
      </div>
      <div id="messages"></div>
      <div id="attachments_strip"></div>
      <div id="composer">
        <button id="add_selection" title="Attach the selected canvas region as context">+ Add selection</button>
        <textarea id="input" placeholder="Ask about the canvas..."></textarea>
        <button id="send">Send</button>
      </div>
      <div id="status">Connecting...</div>
    </div>

    <script src="/canvas.js"></script>
    <script src="/chat.js"></script>
  </body>
</html>
